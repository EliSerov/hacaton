version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:v1.9.3
    container_name: cloudru_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  api:
    build: .
    container_name: cloudru_rag_api
    depends_on:
      - qdrant
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    command: [ "python3", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000" ]
    gpus: all
  bot:
    build: .
    container_name: cloudru_rag_bot
    depends_on:
      - api
    env_file:
      - .env
    command: python3 -m bot.main
    gpus: all

volumes:
  qdrant_data: